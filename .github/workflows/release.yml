name: Release binary

on:
  push:
    tags:
      - "v*"          # triggers on v0.2.0, v1.0.0, etc.
  workflow_dispatch:  # lets you trigger manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04   # glibc 2.35 — binary runs on any host with glibc >= 2.28

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and build
        run: |
          pip install pyinstaller
          pip install -e .
          pyinstaller ospool.spec --noconfirm

      - name: Smoke test
        run: ./dist/ospool --help

      - name: Rename binary with platform tag
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mv dist/ospool dist/ospool-${VERSION}-linux-x86_64

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ospool-linux-x86_64
          path: dist/ospool-*-linux-x86_64

      # Creates a GitHub Release and attaches the binary when triggered by a tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ospool-*-linux-x86_64
          generate_release_notes: true
